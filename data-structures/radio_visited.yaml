apiVersion: v1
resourceType: data-structure
meta:
  hidden: false
  schemaType: event
  customData: {}
data:
  $schema: http://iglucentral.com/schemas/com.snowplowanalytics.self-desc/schema/jsonschema/1-0-0#
  self:
    vendor: com.leosradioexplorer
    name: radio_visited
    format: jsonschema
    version: 1-0-0
  description: Fired when a user visits a radio station detail page
  type: object
  properties:
    station_id:
      type: string
      description: The unique UUID of the radio station
      maxLength: 255
    station_name:
      type: string
      description: The display name of the radio station
      maxLength: 255
    genres:
      type: array
      description: List of genres/tags associated with the station
      items:
        type: string
        maxLength: 255
    city:
      description: City where the station is based (not always available from the API)
      type: ["string", "null"]
      maxLength: 255
    state:
      description: State or region where the station is based
      type: ["string", "null"]
      maxLength: 255
  required:
    - station_id
    - station_name
  additionalProperties: false
