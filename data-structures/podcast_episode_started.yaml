apiVersion: v1
resourceType: data-structure
meta:
  hidden: false
  schemaType: event
  customData: {}
data:
  $schema: http://iglucentral.com/schemas/com.snowplowanalytics.self-desc/schema/jsonschema/1-0-0#
  self:
    vendor: com.leosradioexplorer
    name: podcast_episode_started
    format: jsonschema
    version: 1-0-0
  description: Fired when a user starts listening to a podcast episode
  type: object
  properties:
    episode_id:
      type: string
      description: The unique identifier of the podcast episode
      maxLength: 255
    episode_name:
      type: string
      description: The display name of the podcast episode
      maxLength: 255
    guest_name:
      description: Name of the guest featured in this episode, if any
      type: ["string", "null"]
      maxLength: 255
  required:
    - episode_id
    - episode_name
  additionalProperties: false
